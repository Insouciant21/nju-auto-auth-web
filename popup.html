<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 300px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #1f2933;
        background: #fff;
      }
      h1 { font-size: 15px; margin-bottom: 2px; }
      .sub { font-size: 11px; color: #8899aa; margin-bottom: 14px; }
      .field { margin-bottom: 10px; }
      .field label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 12px; }
      .field input[type="text"],
      .field input[type="password"] {
        width: 100%; height: 32px; padding: 4px 8px;
        border: 1px solid #bcccdc; border-radius: 5px;
        font: inherit;
      }
      .field input:focus { border-color: #2563eb; outline: 3px solid rgba(37,99,235,0.15); }
      .checks { margin: 12px 0; }
      .check { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
      .check input { width: 15px; height: 15px; }
      .btns { display: flex; gap: 8px; margin-top: 14px; }
      button {
        flex: 1; height: 34px; border-radius: 5px; border: 1px solid #bcccdc;
        background: #fff; font: inherit; font-weight: 600; cursor: pointer;
      }
      button.primary { background: #2563eb; color: #fff; border-color: #1d4ed8; }
      button:hover { filter: brightness(0.97); }
      #msg { margin-top: 8px; font-size: 12px; color: #2f855a; min-height: 16px; }
      #msg.err { color: #c53030; }
    </style>
  </head>
  <body>
    <h1>NJU Auto Login</h1>
    <p class="sub">填充学号、密码并自动识别验证码</p>

    <div class="field">
      <label for="sid">学号</label>
      <input id="sid" type="text" autocomplete="username" placeholder="例: 221234567">
    </div>
    <div class="field">
      <label for="pw">密码</label>
      <input id="pw" type="password" autocomplete="current-password">
    </div>

    <div class="checks">
      <label class="check">
        <input id="af" type="checkbox" checked>
        <span>自动填充账号密码</span>
      </label>
      <label class="check">
        <input id="ac" type="checkbox" checked>
        <span>自动识别验证码</span>
      </label>
    </div>

    <div class="btns">
      <button id="save" class="primary">保存</button>
      <button id="open">打开登录页</button>
    </div>
    <p id="msg"></p>

    <script src="popup.js"></script>
  </body>
</html>
